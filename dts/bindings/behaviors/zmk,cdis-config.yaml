description: NICOLA Global Configuration

compatible: "zmk,chord-input-config"

properties:
  timeout-ms:
    type: int
    default: 100
    description: |
      Simultaneous key press detection window in milliseconds.
      NICOLA spec recommends 50-200ms, with 100ms as the typical default.
  sequential-threshold:
    type: int
    default: 2
    description: |
      Coefficient n for sequential typing detection (spec 5.5.2).
      If t1 > t2 * n, the input is judged as sequential (not simultaneous).
  sequential-min-overlap-ms:
    type: int
    default: 20
    description: |
      Minimum overlap time (t2) in ms. If t2 is below this threshold,
      the input is always judged as sequential regardless of t1.
  default-tapping-term-ms:
    type: int
    default: 200
    description: |
      Global default for hold-tap tapping-term-ms. Applied when a
      character behavior has hold-behavior set but leaves tapping-term-ms
      at the inherit sentinel (0). Lets multi-key home-row-mod setups
      tune all keys at once.
  default-quick-tap-ms:
    type: int
    default: 0
    description: |
      Global default for hold-tap quick-tap-ms (repeat-typing protection
      window). Applied when a character behavior has hold-behavior set
      but leaves quick-tap-ms at the inherit sentinel (0). To explicitly
      disable per key while a non-zero global is configured, set the
      per-key value to 1.
  default-require-prior-idle-ms:
    type: int
    default: 0
    description: |
      Global default for hold-tap require-prior-idle-ms. Applied when a
      character behavior has hold-behavior set but leaves
      require-prior-idle-ms at the inherit sentinel (0). The default 0
      keeps the feature opt-in (legacy behavior).
  hold-after-partner-release-ms:
    type: int
    default: 30
    description: |
      Global default for the short grace period after a plain combo
      partner is released, during which an HT-undecided character key may
      still flip to combo by releasing within the window. If no HT
      releases in time, the HT commits to HOLD and the partner is replayed
      via the base layer. This never makes HOLD commit earlier than
      tapping-term-ms. Keep this much smaller than tapping-term-ms; it
      absorbs release-order jitter rather than defining the primary
      hold/tap threshold.
  auto-off-keys:
    type: array
    description: |
      Array of (modifier_mask, encoded_keycode) pairs. When a modifier
      key matching any pair is held and the corresponding character key
      is pressed while NICOLA is active, NICOLA is automatically
      deactivated (flush + layer off + LANG2).
      Example for Emacs C-x, C-s, M-x:
        auto-off-keys = <(MOD_LCTL|MOD_RCTL) X (MOD_LCTL|MOD_RCTL) S (MOD_LALT|MOD_RALT) X>;
  passthrough-behaviors:
    type: phandles
    description: |
      List of behavior devices whose "active" state triggers NICOLA
      passthrough (keys fall through to the base layer instead of
      producing kana). Intended for behaviors like &caps_word or
      &shift_word that apply implicit modifiers which would corrupt
      romaji output.
      The referenced behavior's device data must have `bool active`
      as its first struct field (matching caps_word / shift_word layout).
      Example:
        passthrough-behaviors = <&shift_word>;
        passthrough-behaviors = <&caps_word &shift_word>;
